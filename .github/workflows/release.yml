name: Release

on:
  push:
    tags:
      - 'v*'

# Release 需要 write 权限：创建 Release、推送 Docker 镜像到 ghcr.io
permissions:
  contents: write
  packages: write

jobs:
  # ============================================================
  # Job 1: 构建 Server Docker 镜像，推送到 GitHub Container Registry
  # ============================================================
  server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/infopush
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ============================================================
  # Job 2: 构建 Android APK，上传到 GitHub Release
  # ============================================================
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: |
          mkdir -p app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore/infopush-release.jks

      - name: Grant execute permission for gradlew
        run: chmod +x app/gradlew

      - name: Build release APK
        working-directory: app
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/keystore/infopush-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: app/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Job 3: 构建 Desktop Windows 安装包，上传到 GitHub Release
  # ============================================================
  desktop:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: desktop

      - name: Build Tauri app and create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'InfoPush ${{ github.ref_name }}'
          releaseBody: |
            ## InfoPush ${{ github.ref_name }}

            ### 下载
            - **Android**: 下载下方 `.apk` 文件
            - **Windows**: 下载下方 `.exe` 或 `.nsis.zip` 安装包
            - **Docker**: `docker pull ghcr.io/joclto/infopush:${{ github.ref_name }}`

            ### 更新内容
            请查看下方 commits 记录。
          releaseDraft: false
          prerelease: false

      - name: Package portable zip for JoclToolkit
        id: package
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          # The portable exe is directly from the build output
          $exe = "desktop/src-tauri/target/release/InfoPush.exe"
          if (-not (Test-Path $exe)) { Write-Error "InfoPush.exe not found"; exit 1 }
          # Create portable zip
          $zipName = "info-push-v${version}.zip"
          Compress-Archive -Path $exe -DestinationPath $zipName
          # Calculate checksum and size
          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash
          $size = (Get-Item $zipName).Length
          echo "zipName=$zipName" >> $env:GITHUB_OUTPUT
          echo "checksum=sha256:$hash" >> $env:GITHUB_OUTPUT
          echo "size=$size" >> $env:GITHUB_OUTPUT
          echo "Packaged: $zipName ($size bytes, sha256:$hash)"

      - name: Upload portable zip to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release upload "$tag" "${{ steps.package.outputs.zipName }}" --clobber

      - name: Dispatch to JoclToolkit
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh api repos/Joclto/JoclToolkit/dispatches -f event_type=tool-updated -f "client_payload[tool_id]=info-push" -f "client_payload[tool_name]=InfoPush" -f "client_payload[version]=$tag" -f "client_payload[source_repo]=$env:GITHUB_REPOSITORY" -f "client_payload[asset_name]=${{ steps.package.outputs.zipName }}" -f "client_payload[checksum]=${{ steps.package.outputs.checksum }}" -f "client_payload[size]=${{ steps.package.outputs.size }}"
          echo "Dispatched to JoclToolkit"
